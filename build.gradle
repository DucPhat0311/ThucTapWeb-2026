/*
 * This file was generated by the Gradle 'init' task.
 * Edited for Servlet/JSP WAR deployment.
 */

plugins {
    id 'java'
    id 'war'
    id "org.hidetake.ssh" version "2.11.2"
}

repositories {
    mavenLocal()
    mavenCentral()
}

dependencies {
    // Runtime libraries cần đóng gói vào WAR
    implementation libs.org.glassfish.web.jakarta.servlet.jsp.jstl
    implementation libs.org.jdbi.jdbi3.core
    implementation libs.jakarta.servlet.jsp.jstl.jakarta.servlet.jsp.jstl.api
    implementation libs.com.mysql.mysql.connector.j
    implementation libs.com.fasterxml.jackson.core.jackson.databind
    implementation libs.com.sun.mail.jakarta.mail
    implementation libs.ch.qos.logback.logback.core
    implementation libs.ch.qos.logback.logback.classic
    implementation libs.org.mindrot.jbcrypt
    implementation libs.com.restfb.restfb

    // Tomcat đã có sẵn Servlet/JSP API nên chỉ compile, không đóng gói vào WAR
    compileOnly libs.jakarta.servlet.jakarta.servlet.api
    compileOnly libs.jakarta.servlet.jsp.jakarta.servlet.jsp.api

    // Test
    testImplementation libs.org.junit.jupiter.junit.jupiter.api
    testImplementation libs.org.junit.jupiter.junit.jupiter.engine
}

group = 'vn.edu.nlu.fit'
version = '1.0-SNAPSHOT'
description = 'ShopQuanAo'

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

tasks.withType(Javadoc).configureEach {
    options.encoding = 'UTF-8'
}

test {
    useJUnitPlatform()
}

// Build ra ROOT.war để deploy ở đường dẫn gốc: http://192.168.100.117
war {
    archiveFileName = 'ROOT.war'
}
ssh.settings {
    knownHosts = allowAnyHosts
}

remotes {
    host {
        host = '192.168.100.117'
        user = 'han'
        password = project.findProperty('sshPassword') ?: ''
    }
}

tasks.register('docker_upload_file_to_server') {
    dependsOn war

    doLast {
        println 'begin docker_upload_file_to_server'

        ssh.run {
            session(remotes.host) {
                execute 'mkdir -p /usr/deploy'
                execute 'rm -f /usr/deploy/ROOT.war', ignoreError: true

                put from: "${project.buildDir}/libs/ROOT.war",
                    into: "/usr/deploy/ROOT.war"
            }
        }
    }
}

tasks.register('docker_app_start') {
    doLast {
        println 'begin docker_app_start'

        ssh.run {
            session(remotes.host) {
                execute 'docker restart tomcat10'
            }
        }
    }
}

tasks.register('docker_deploy') {
    dependsOn war
    dependsOn docker_upload_file_to_server
    dependsOn docker_app_start

    tasks.named('docker_upload_file_to_server').get().mustRunAfter war
    tasks.named('docker_app_start').get().mustRunAfter docker_upload_file_to_server
}